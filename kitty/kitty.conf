###############################################
# FONTES
###############################################
font_family JetBrainsMono Nerd Font
font_size 11

# Espaçamento vertical (opcional — deixa mais agradável)
adjust_line_height 2

###############################################
# CORES (Catppuccin Macchiato)
###############################################

foreground              #cad3f5
background              #0e0e0e
selection_foreground    #24273a
selection_background    #444444

# Cursor
cursor                  #f4dbd6
cursor_text_color       #24273a

# Scrollbar
scrollbar_handle_color  #939ab7
scrollbar_track_color   #494d64

# URL
url_color               #f4dbd6

# Borders
active_border_color     #b7bdf8
inactive_border_color   #6e738d
bell_border_color       #eed49f

# Tabs
active_tab_foreground   #181926
active_tab_background   #c6a0f6
inactive_tab_foreground #cad3f5
inactive_tab_background #1e2030
tab_bar_background      #181926

# Normal
color0 #494d64
color1 #ed8796
color2 #a6da95
color3 #eed49f
color4 #8aadf4
color5 #f5bde6
color6 #8bd5ca
color7 #b8c0e0

# Bright
color8  #5b6078
color9  #ed8796
color10 #a6da95
color11 #eed49f
color12 #8aadf4
color13 #f5bde6
color14 #8bd5ca
color15 #a5adcb

###############################################
# CURSOR
###############################################
cursor_shape block

###############################################
# JANELA
###############################################
background_opacity 0.95

# Padding
window_padding_width 6

# Suavizar bordas do terminal
window_border_width 0
inactive_text_alpha 1.0

###############################################
# SHELL PADRÃO
###############################################
shell /usr/bin/fish

###############################################
# COMPORTAMENTO E MELHORIAS
###############################################

# Usar Wayland nativo
wayland_titlebar_color system

# Renderização mais rápida
repaint_delay 7
input_delay 2
sync_to_monitor yes

# Suporte a ligatures (JetBrainsMono tem)
enable_ligatures always

# Scroll mais suave
wheel_scroll_multiplier 3.0

# Melhor seleção
select_by_word_characters :@-./_~?&=%+#

###############################################
# ATALHOS ÚTEIS (opcionais)
###############################################

# Abrir nova aba
map ctrl+shift+t new_tab

# Fechar aba
map ctrl+shift+w close_tab

# Dividir horizontal
map ctrl+shift+right launch --location=hsplit

# Dividir vertical
map ctrl+shift+down launch --location=vsplit

# Copiar e colar estilo "moderno"
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

###############################################
# CONFIG EXTRA (BONUS)
###############################################

# Título da janela mostrando shell + diretório
window_title_format "{title} — {cwd}"

# Fazer o kitty abrir mais rápido ainda
initial_window_width 900
initial_window_height 600

